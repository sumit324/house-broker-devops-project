{% extends 'base.html' %}

{% block content %}
<h2>Available Houses</h2>

<div class="row">
    {% for house in houses %}
    <div class="col-md-4">
        <div class="card mb-3">
            <div class="card-body">
                <h5>{{ house.title }}</h5>
                <p>{{ house.location }}</p>
                <p>₹{{ house.price }}</p>
                <p>{{ house.description }}</p>
            </div>
        </div>
    </div>
    {% endfor %}
</div>
{% endblock %}
